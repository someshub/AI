<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Solutions - 43 AI Services</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;padding:20px}
  .container{max-width:1200px;margin:0 auto}
  h1{text-align:center;margin-bottom:10px;font-size:2.5rem;background:linear-gradient(90deg,#00ff88,#00aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .subtitle{text-align:center;color:#888;margin-bottom:30px}
  .filters{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:30px}
  .filter-btn{padding:10px 20px;background:#1a1a1a;border:1px solid #333;border-radius:25px;cursor:pointer;transition:0.3s;color:#fff}
  .filter-btn:hover,.filter-btn.active{background:#00ff88;color:#000;border-color:#00ff88}
  .search-box{width:100%;max-width:500px;margin:0 auto 30px;display:block;padding:12px 20px;background:#1a1a1a;border:1px solid #333;border-radius:25px;color:#fff}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px}
  .card{background:#1a1a1a;border:1px solid #333;border-radius:15px;padding:20px;transition:0.3s;position:relative;overflow:hidden}
  .card:hover{border-color:#00ff88;transform:translateY(-5px)}
  .card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#00ff88,#00aaff)}
  .card-num{position:absolute;top:15px;right:15px;background:#00ff88;color:#000;width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold}
  .card-title{font-size:1.3rem;margin-bottom:10px;color:#00ff88}
  .card-category{display:inline-block;padding:4px 12px;background:#333;border-radius:12px;font-size:0.75rem;margin-bottom:10px;color:#aaa}
  .card-usecase{color:#ccc;margin-bottom:15px;font-size:0.9rem;line-height:1.5}
  .card-tech{background:#0a0a0a;padding:10px;border-radius:8px;margin-bottom:15px;font-size:0.8rem;color:#00aaff;font-family:monospace}
  .card-price{font-size:1.4rem;font-weight:bold;color:#00ff88;margin-bottom:15px}
  .card-btn{width:100%;padding:12px;background:linear-gradient(90deg,#00ff88,#00aaff);border:none;border-radius:8px;color:#000;font-weight:bold;cursor:pointer;transition:0.3s}
  .card-btn:hover{opacity:0.8}
  .hidden{display:none}
  .cta-box{text-align:center;margin-top:50px;padding:40px;background:#1a1a1a;border-radius:15px;border:1px solid #333}
  .cta-box h2{margin-bottom:15px}
  .cta-box a{display:inline-block;margin-top:15px;padding:15px 30px;background:#00ff88;color:#000;text-decoration:none;border-radius:8px;font-weight:bold}
  @media(max-width:768px){.grid{grid-template-columns:1fr}h1{font-size:1.8rem}}
</style>
</head>
<body>
<div class="container">
  <h1>Agentic AI Services</h1>
  <p class="subtitle">BTM Bangalore se Duniya Tak - 43 AI Solutions |.NET + Azure + IoT</p>
  
  <input type="text" class="search-box" id="searchBox" placeholder="Search: RAG, IoT, Factory, WhatsApp...">
  
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All 43</button>
    <button class="filter-btn" data-filter="chat">Conversational AI</button>
    <button class="filter-btn" data-filter="iot">Industrial IoT</button>
    <button class="filter-btn" data-filter="doc">Document AI</button>
    <button class="filter-btn" data-filter="data">Data + Analytics</button>
    <button class="filter-btn" data-filter="marketing">Marketing AI</button>
    <button class="filter-btn" data-filter="dev">AI Integration</button>
    <button class="filter-btn" data-filter="niche">Specialized</button>
    <button class="filter-btn" data-filter="future">Future Tech</button>
  </div>

  <div class="grid" id="serviceGrid">
    <!-- Cards yahan JS se load honge -->
  </div>

  <div class="cta-box">
    <h2>Custom AI Solution Chahiye?</h2>
    <p>BTM me baithe hain. 1 din me demo, 7 din me delivery.</p>
    <a href="https://wa.me/919131367020?text=Hi%20Somesh,%20Mujhe%20AI%20Agent%20chahiye" target="_blank">WhatsApp Pe Baat Karo</a>
  </div>
</div>

<script src="services-data.js"></script>
<script src="app.js"></script>
</body>
</html>
